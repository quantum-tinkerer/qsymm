image: ghcr.io/prefix-dev/pixi:0.66.0

variables:
  GIT_SUBMODULE_STRATEGY: recursive

  FF_USE_FASTZIP: "true"
  CACHE_COMPRESSION_LEVEL: "fastest"

default:
  before_script:
    - pixi --version
    - pixi global install git

stages:
  - test
  - integration
  - docs
  - deploy

run tests:
  stage: test
  variables:
    GIT_STRATEGY: clone
  parallel:
    matrix:
      - PIXI_ENV:
        - minimal
        - latest
  script:
    - pixi run -e $PIXI_ENV tests
  cache:
    key: "$CI_JOB_NAME-$PIXI_ENV"
    paths:
      - .pixi

run coverage:
  stage: test
  variables:
    PIXI_ENV: minimal
  script:
    - pixi run -e $PIXI_ENV test-coverage
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  artifacts:
    paths:
      - htmlcov
    reports:
      junit: junit.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
  cache:
    key: "$CI_JOB_NAME-$PIXI_ENV"
    paths:
      - .pixi

run pre-commit:
  stage: integration
  variables:
    PRE_COMMIT_HOME: $CI_PROJECT_DIR/.pre-commit-cache
  script:
    - pixi run -e precommit git config --global --add safe.directory $CI_PROJECT_DIR
    - pixi run -e precommit pre-commit run --all-files
  cache:
    key: "$CI_JOB_NAME"
    paths:
      - .pre-commit-cache
      - .pixi


build docs:
  stage: docs
  script:
    - pixi run docs-build
  artifacts:
    paths:
      - docs/build
  cache:
    key: "$CI_JOB_NAME"
    paths:
      - .pixi

publish to test pypi:
  stage: deploy
  needs:
    - run tests
    - run coverage
    - run pre-commit
    - build docs
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+.*\+test$/'
  script:
    - pixi run -e publish build
    - pixi run -e publish publish -a $PYPI_TEST_TOKEN -r test
  cache:
    key: "$CI_JOB_NAME"
    paths:
      - .pixi

publish to pypi:
  stage: deploy
  needs:
    - run tests
    - run coverage
    - run pre-commit
    - build docs
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+[^+]*$/'
  script:
    - pixi run -e publish build
    - pixi run -e publish publish -a $PYPI_TOKEN
  cache:
    key: "$CI_JOB_NAME"
    paths:
      - .pixi
