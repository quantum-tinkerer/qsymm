image: ghcr.io/prefix-dev/pixi:0.66.0

variables:
  GIT_SUBMODULE_STRATEGY: recursive

  FF_USE_FASTZIP: "true"
  CACHE_COMPRESSION_LEVEL: "fastest"

default:
  before_script:
    - pixi --version
    - pixi global install git

stages:
  - test
  - integration
  - docs

run tests:
  stage: test
  variables:
    GIT_STRATEGY: clone
  parallel:
    matrix:
      - PIXI_ENV:
        - minimal
        - latest
  script:
    - pixi run -e $PIXI_ENV tests
  cache:
    key: "$CI_JOB_NAME-$PIXI_ENV"
    paths:
      - .pixi

run coverage:
  stage: test
  variables:
    PIXI_ENV: minimal
  script:
    - pixi run -e $PIXI_ENV test-coverage
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  artifacts:
    paths:
      - htmlcov
    reports:
      junit: junit.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
  cache:
    key: "$CI_JOB_NAME-$PIXI_ENV"
    paths:
      - .pixi


build docs:
  stage: docs
  script:
    - pixi run docs-build
  artifacts:
    paths:
      - docs/build
  cache:
    key: "$CI_JOB_NAME"
    paths:
      - .pixi
