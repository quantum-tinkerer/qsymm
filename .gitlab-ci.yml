image: ghcr.io/prefix-dev/pixi:0.55.0

variables:
  GIT_SUBMODULE_STRATEGY: recursive

  FF_USE_FASTZIP: "true"
  CACHE_COMPRESSION_LEVEL: "fastest"

default:
  before_script:
    - pixi --version
    - pixi global install git

stages:
  - test
  - integration
  - docs

run tests:
  stage: test
  variables:
    GIT_STRATEGY: clone
  parallel:
    matrix:
      - PIXI_ENV:
        - test-min
        - test-mid
  script:
    - pixi run -e $PIXI_ENV test
  cache:
    key: "$CI_JOB_NAME-$PIXI_ENV"
    paths:
      - .pixi

run coverage:
  stage: test
  variables:
    PIXI_ENV: test-latest
  script:
    - pixi run -e $PIXI_ENV test-coverage
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  artifacts:
    paths:
      - htmlcov
    reports:
      junit: junit.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
  cache:
    key: "$CI_JOB_NAME-$PIXI_ENV"
    paths:
      - .pixi


build docs:
  stage: docs
  script:
    - pixi run docs
  artifacts:
    paths:
      - docs/build/html
  cache:
    key: "$CI_JOB_NAME"
    paths:
      - .pixi
